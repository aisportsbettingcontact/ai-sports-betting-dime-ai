# ─── CI Pipeline — aisportsbettingmodels.com ─────────────────────────────────
#
# Triggers:
#   - Every push to main (post-merge validation)
#   - Every pull request targeting main (pre-merge gate)
#   - Manual dispatch (on-demand audit)
#
# Stages:
#   1. security-audit   — pnpm audit --audit-level=high (blocks on HIGH or CRITICAL CVEs)
#   2. typecheck        — tsc --noEmit (zero TypeScript errors required)
#   3. test             — gated vitest run: zero failures, and every skipped
#                         suite must be declared (with a reason) in
#                         vitest.environment-failure-allowlist.json, enforced
#                         by scripts/check-environment-failures.mjs
#   3b. db-tests        — the five real-database suites against an isolated
#                         MySQL service container (no repository secrets
#                         required; the container is job-local)
#   3c. build           — production client build + preview-activation scan
#                         (scripts/verify-preview-production.mjs)
#
# Secrets: the env block below documents the FULL set the suite can consume,
# but as of 2026-07-12 the repository configures only a subset (verified via
# the Actions secrets API: APP_SESSION_SECRET, CRON_SECRET, JWT_SECRET,
# RAILWAY_API_TOKEN, RAILWAY_APP_URL, TARGET_DATABASE_URL).
# Unconfigured names inject empty strings; the suites that need them guard
# themselves and their skips are declared and machine-checked. Provisioning
# the remaining secrets turns those probes back on without workflow changes.
#
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel any in-progress run for the same ref so pushes don't queue up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Stage 1: Dependency Security Audit ──────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: "[INPUT] Checkout repository"
        uses: actions/checkout@v7

      - name: "[STEP] Setup Node.js 22"
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # `pnpm audit` calls npm's legacy /-/npm/v1/security/audits[/quick]
      # endpoints, which npm retired 2026-07-15 (410 Gone). The fix landed in
      # pnpm v11.0, but this repo is intentionally pinned to pnpm@10.33.0 (see
      # the packageManager field — pnpm/action-setup@v4 misparses a sha512
      # hash there, GHSA-379q-355j-w6rj) and pnpm v11 silently stops reading
      # the package.json "pnpm" config block (overrides/patchedDependencies/
      # onlyBuiltDependencies/auditConfig) — a bigger, separate migration.
      # `npm audit` was tried as a substitute and abandoned: it can't even
      # resolve this repo's tree (a transitive dependency ships a Yarn-only
      # `patch:` devDependency reference npm's parser has never supported).
      # osv-scanner reads pnpm-lock.yaml directly — no install, no dependency
      # resolution — so it audits the actual pinned versions and sidesteps
      # both problems. See osv-scanner.toml for the full rationale and the
      # ignore-list, and scripts/check-osv-scan.mjs for the severity gate.
      - name: "[STEP] Install osv-scanner"
        run: |
          curl -sSL -o /usr/local/bin/osv-scanner "https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64"
          chmod +x /usr/local/bin/osv-scanner
          osv-scanner --version

      - name: "[STEP] Run osv-scanner — fail on new HIGH or CRITICAL CVEs"
        run: |
          echo "[INPUT] Scanning pnpm-lock.yaml with osv-scanner..."
          osv-scanner scan source --lockfile=pnpm-lock.yaml --config=osv-scanner.toml \
            --format=json --output-file=osv-report.json || true
          node scripts/check-osv-scan.mjs --input=osv-report.json

      - name: "[OUTPUT] Upload audit report as artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report
          path: osv-report.json
          retention-days: 30

  # ─── Stage 2: TypeScript Type Check ──────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    needs: security-audit
    steps:
      - name: "[INPUT] Checkout repository"
        uses: actions/checkout@v7

      - name: "[STEP] Setup pnpm"
        uses: pnpm/action-setup@v4
        # No 'version' key — packageManager in package.json is the single source of truth.

      - name: "[STEP] Setup Node.js 22"
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: "[STEP] Install dependencies (frozen lockfile)"
        run: pnpm install --frozen-lockfile

      - name: "[STEP] Run TypeScript compiler — zero errors required"
        # tsc --noEmit: type-checks the entire project without emitting output.
        # Strict mode is enforced via tsconfig.json. Any type error fails the build.
        #
        # [VERIFY] This gate ensures no type regressions are merged. Combined with
        # strict: true in tsconfig, it catches null dereferences, missing props,
        # and incorrect API call shapes before they reach production.
        #
        # NODE_OPTIONS: the project outgrew Node's default ~2 GB heap — tsc was
        # dying with "JavaScript heap out of memory" (exit 134) on every run
        # since at least 80bdda2, before any type errors could be reported.
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          echo "[INPUT] Running tsc --noEmit on full project..."
          npx tsc --noEmit 2>&1 | tee typecheck-report.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "[STATE] TypeScript exit code: $EXIT_CODE"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "[OUTPUT] FAIL — TypeScript errors detected"
            cat typecheck-report.txt
            echo "[VERIFY] Fix all type errors before merging"
            exit $EXIT_CODE
          fi
          echo "[OUTPUT] PASS — TypeScript: 0 errors"
          echo "[VERIFY] Full project type-checks clean"

      - name: "[OUTPUT] Upload typecheck report as artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-report
          path: typecheck-report.txt
          retention-days: 30

  # ─── Stage 3: Vitest Test Suite ──────────────────────────────────────────
  test:
    name: Vitest
    runs-on: ubuntu-latest
    needs: typecheck
    env:
      # Full env surface the suite can consume. NOTE: most of these secrets
      # are NOT configured in this repository (see header) — unconfigured
      # names inject empty strings, the affected suites skip themselves, and
      # the env-gate requires every such skip to be declared.
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      APP_SESSION_SECRET: ${{ secrets.APP_SESSION_SECRET }}
      PUBLIC_ORIGIN: ${{ secrets.PUBLIC_ORIGIN }}
      VITE_APP_ID: ${{ secrets.VITE_APP_ID }}
      OAUTH_SERVER_URL: ${{ secrets.OAUTH_SERVER_URL }}
      OWNER_OPEN_ID: ${{ secrets.OWNER_OPEN_ID }}
      # Non-secret config values
      NODE_ENV: test
      VSIN_EMAIL: ${{ secrets.VSIN_EMAIL }}
      VSIN_PASSWORD: ${{ secrets.VSIN_PASSWORD }}
      KENPOM_EMAIL: ${{ secrets.KENPOM_EMAIL }}
      KENPOM_PASSWORD: ${{ secrets.KENPOM_PASSWORD }}
      METABET_API_KEY: ${{ secrets.METABET_API_KEY }}
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
      DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
      DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
    steps:
      - name: "[INPUT] Checkout repository"
        uses: actions/checkout@v7

      - name: "[STEP] Setup pnpm"
        uses: pnpm/action-setup@v4
        # No 'version' key — packageManager in package.json is the single source of truth.

      - name: "[STEP] Setup Node.js 22"
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: "[STEP] Install dependencies (frozen lockfile)"
        run: pnpm install --frozen-lockfile

      - name: "[STEP] Run gated Vitest suite — zero failures, no undeclared skips"
        # scripts/check-environment-failures.mjs consumes the JSON reporter
        # output. CI profile: any failure fails; any skip not declared in
        # vitest.environment-failure-allowlist.json (expectedCiSkips) fails.
        # Dependabot actors are evaluated with the local profile because
        # repository secrets are structurally absent for them.
        run: |
          pnpm run test:gated:ci 2>&1 | tee test-report.txt
          exit ${PIPESTATUS[0]}

      - name: "[OUTPUT] Upload test + gate reports as artifacts"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: |
            test-report.txt
            env-gate-report.json
            vitest-results.json
          retention-days: 30

  # ─── Stage 3b: Real-database suites (isolated MySQL service) ──────────────
  # These five suites cover login cookies, registration, password reset,
  # Stripe account setup auto-login, and tokenVersion force-logout. They are
  # guarded by SKIP_DB_IN_CI, so they skip in the secretless job above and run
  # here against a job-local MySQL container — no repository secrets involved.
  db-tests:
    name: DB Tests
    runs-on: ubuntu-latest
    needs: typecheck
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "1"
          MYSQL_DATABASE: dime_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: mysql://root@127.0.0.1:3306/dime_test
      DB_TESTS: "1"
      NODE_ENV: test
    steps:
      - name: "[INPUT] Checkout repository"
        uses: actions/checkout@v7

      - name: "[STEP] Setup pnpm"
        uses: pnpm/action-setup@v4

      - name: "[STEP] Setup Node.js 22"
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: "[STEP] Install dependencies (frozen lockfile)"
        run: pnpm install --frozen-lockfile

      # Schema comes from `drizzle-kit push` (the current TS schema), NOT
      # `drizzle-kit migrate`: the checked-in migration history is not
      # replayable from scratch (0097 and 0104 both CREATE TABLE
      # wc2026_matches — proven by this job's first run on PR #84). Production
      # never replays history either; db-push.yml applies increments to the
      # long-lived database. Recorded in
      # docs/remediation/2026-07-12-pr70/final-report.md (finding 11).
      - name: "[STEP] Provision the current schema on the isolated database"
        run: pnpm exec drizzle-kit push --force

      # --no-file-parallelism: the five suites share ONE database and
      # tokenVersion.db.test.ts performs a global mutation
      # (incrementAllTokenVersions bumps EVERY user's tokenVersion), which
      # invalidates other suites' live sessions mid-test when files run in
      # parallel workers. Proven by this job's second run on PR #84:
      # register [ER-1] got "Session invalidated" (jwt.tv=1 db.tv=2) instead
      # of CONFLICT while the tokenVersion suite logged "affected 17 users".
      - name: "[STEP] Run the six real-database suites"
        run: |
          pnpm exec vitest run --no-file-parallelism \
            server/appUsers.login.test.ts \
            server/appUsers.register.test.ts \
            server/completeAccountSetup.test.ts \
            server/passwordReset.test.ts \
            server/tokenVersion.db.test.ts \
            server/mlbDoubleheader.db.test.ts \
            --reporter=verbose 2>&1 | tee db-test-report.txt
          exit ${PIPESTATUS[0]}

      - name: "[OUTPUT] Upload DB test report"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: db-test-report
          path: db-test-report.txt
          retention-days: 30

  # ─── Stage 3c: Production build + preview-activation gate ─────────────────
  build:
    name: Build & Preview Gate
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - name: "[INPUT] Checkout repository"
        uses: actions/checkout@v7

      - name: "[STEP] Setup pnpm"
        uses: pnpm/action-setup@v4

      - name: "[STEP] Setup Node.js 22"
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: "[STEP] Install dependencies (frozen lockfile)"
        run: pnpm install --frozen-lockfile

      - name: "[STEP] Build production client"
        run: pnpm run build:client

      - name: "[VERIFY] Preview activation is dead in production output"
        run: node scripts/verify-preview-production.mjs dist/public

      - name: "[VERIFY] Bundle budget"
        run: pnpm run check:bundle
