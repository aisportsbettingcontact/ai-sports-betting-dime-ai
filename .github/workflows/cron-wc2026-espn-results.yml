# Cron — WC2026 ESPN results — GitHub Actions timer for a Manus-orphaned background job.
#
# After the Manus Heartbeat is retired, nothing triggers /api/scheduled/wc2026-espn-results. This
# workflow fires POST /api/scheduled/wc2026-espn-results on the Railway app on a schedule. The
# endpoint is shared-secret authed (CRON_SECRET, re-gated by cronAuth.ts) and
# runs the sync under its own in-process overlap guard.
#
# IMPORTANT (cutover runbook): this workflow ships ENABLED on the default cron.
# GitHub Actions cron cannot be shipped disabled, so a workflow_dispatch trigger
# is provided for manual runs. It MUST NOT run while Manus still writes the same
# data — enable/disable it from the Actions UI (⋯ → Disable workflow) at the
# cutover moment to avoid double-writes.
#
# Required repo secrets:
#   RAILWAY_APP_URL — e.g. https://your-app.up.railway.app  (no trailing slash)
#   CRON_SECRET     — must match the CRON_SECRET env var set in Railway → Variables
#
# Note: GitHub cron is UTC and best-effort (runs can be delayed minutes under
# platform load).
name: Cron — WC2026 ESPN results

on:
  schedule:
    - cron: "0 8 * * *" # daily at 08:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: cron-wc2026-espn-results
  cancel-in-progress: false

jobs:
  fire:
    name: Trigger /api/scheduled/wc2026-espn-results
    runs-on: ubuntu-latest
    steps:
      - name: "[STEP] Preflight — verify required secrets are present"
        env:
          RAILWAY_APP_URL: ${{ secrets.RAILWAY_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${RAILWAY_APP_URL:-}" ]; then
            echo "::error::RAILWAY_APP_URL secret is not set"; exit 1
          fi
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CRON_SECRET secret is not set"; exit 1
          fi
          echo "[PREFLIGHT] secrets present"

      - name: "[STEP] POST /api/scheduled/wc2026-espn-results (secret never printed)"
        env:
          RAILWAY_APP_URL: ${{ secrets.RAILWAY_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          URL="${RAILWAY_APP_URL%/}/api/scheduled/wc2026-espn-results"
          echo "[INPUT] POST $URL at $(date -u +%FT%TZ)"
          BODY_FILE="$(mktemp)"
          CODE=$(curl -sS -o "$BODY_FILE" -w '%{http_code}' \
            --max-time 60 --retry 2 --retry-delay 5 --retry-connrefused \
            -X POST "$URL" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: gh-actions-cron/wc2026-espn-results")
          echo "[OUTPUT] HTTP $CODE"
          echo "[OUTPUT] body: $(cat "$BODY_FILE")"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "::error::wc2026-espn-results trigger failed with HTTP $CODE"
            exit 1
          fi
          echo "[VERIFY] PASS — wc2026-espn-results accepted (HTTP $CODE)"
