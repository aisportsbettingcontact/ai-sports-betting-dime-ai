# One-shot asset fetcher (owner directive 2026-07-18): the sandboxed agent
# container has no egress to image CDNs and chat attachments never reach the
# repo, so a CI runner (real egress) resolves the OFFICIAL 2026 FIFA World Cup
# emblem via the MediaWiki API — no hand-guessed asset URLs — renders it to
# PNG, derives a white-element variant for dark mode, and commits BOTH as
# candidates to this branch for visual verification + promotion to the final
# /brand filenames. Read-only against the outside world; writes only to the
# branch it runs on. Delete this workflow once the emblem ships.
name: Fetch WC26 emblem (one-shot)

on:
  workflow_dispatch:
  # workflow_dispatch only works once the file is on the default branch, so
  # the one-shot fires on pushes that touch THIS file on the work branch.
  # The run's own candidate commit doesn't touch this path (and GITHUB_TOKEN
  # pushes don't retrigger workflows), so it cannot loop.
  push:
    branches: [claude/all-skills-0bco9o]
    paths: [".github/workflows/fetch-wc-emblem.yml"]

permissions:
  contents: write

concurrency:
  group: fetch-wc-emblem
  cancel-in-progress: false

jobs:
  fetch:
    name: Resolve, render, commit candidates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install render tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq librsvg2-bin imagemagick jq

      - name: Resolve the emblem via the MediaWiki API
        run: |
          set -euo pipefail
          UA="dime-ai-asset-fetch/1.0 (owner-directed one-shot; contact repo owner)"
          # 1) The article's lead/infobox image (the official emblem on the
          #    "2026 FIFA World Cup" article), original resolution.
          URL=$(curl -sS -A "$UA" "https://en.wikipedia.org/w/api.php?action=query&titles=2026%20FIFA%20World%20Cup&prop=pageimages&piprop=original&format=json" \
            | jq -r '.query.pages | to_entries[0].value.original.source // empty')
          echo "pageimage: ${URL:-<none>}"
          # 2) Fallback: known file-title forms via imageinfo.
          if [ -z "$URL" ]; then
            for t in "File:2026 FIFA World Cup emblem.svg" "File:2026 FIFA World Cup logo.svg" "File:2026 FIFA World Cup.svg"; do
              enc=$(jq -rn --arg s "$t" '$s|@uri')
              URL=$(curl -sS -A "$UA" "https://en.wikipedia.org/w/api.php?action=query&titles=$enc&prop=imageinfo&iiprop=url&format=json" \
                | jq -r '.query.pages | to_entries[0].value.imageinfo[0].url // empty')
              echo "try '$t' -> ${URL:-<none>}"
              [ -n "$URL" ] && break
            done
          fi
          [ -n "$URL" ] || { echo "::error::could not resolve an emblem URL"; exit 1; }
          echo "RESOLVED_URL=$URL" >> "$GITHUB_ENV"
          curl -sS -A "$UA" -o source_asset "$URL"
          file source_asset
          ls -la source_asset

      - name: Render + derive variants
        run: |
          set -euo pipefail
          mkdir -p client/public/brand/_wc26
          rm -f client/public/brand/_wc26/whitened.png  # round-1 raster recolor damaged the trophy; superseded
          [ "$(file -b --mime-type source_asset)" = "image/svg+xml" ] || { echo "::error::need the SVG source for a vector-safe variant"; exit 1; }
          cp source_asset client/public/brand/_wc26/source.svg
          rsvg-convert -h 600 --keep-aspect-ratio source_asset > client/public/brand/_wc26/original.png
          # Dark-mode candidate — VECTOR-ONLY monochrome invert: swap black<->white
          # in fill/stroke/style declarations of the SVG text (the "26" glyphs and
          # FIFA wordmark are flat vector paths). The trophy is an embedded raster
          # (base64 data URI) and is never touched — this reproduces FIFA's own
          # reversed emblem treatment without altering the artwork.
          python3 - <<'PY'
          import re
          svg = open('source_asset', encoding='utf-8', errors='surrogateescape').read()
          # Protect embedded raster data URIs from any substitution.
          blobs = []
          def stash(m):
              blobs.append(m.group(0)); return f'@@BLOB{len(blobs)-1}@@'
          svg2 = re.sub(r'data:image/[^"\')\s]+', stash, svg)
          def swap(m):
              v = m.group(0).lower()
              if v in ('#000', '#000000', 'black', 'rgb(0,0,0)'): return '#ffffff'
              return '#000000'
          svg2 = re.sub(r'#000000|#ffffff|#000\b|#fff\b|\bblack\b|\bwhite\b|rgb\(0,\s*0,\s*0\)|rgb\(255,\s*255,\s*255\)', swap, svg2, flags=re.I)
          for i, b in enumerate(blobs):
              svg2 = svg2.replace(f'@@BLOB{i}@@', b)
          open('inverted.svg', 'w', encoding='utf-8', errors='surrogateescape').write(svg2)
          print('vector invert done; bytes:', len(svg2))
          PY
          rsvg-convert -h 600 --keep-aspect-ratio inverted.svg > client/public/brand/_wc26/inverted.png
          identify client/public/brand/_wc26/original.png client/public/brand/_wc26/inverted.png
          sha256sum client/public/brand/_wc26/*
          echo "source: $RESOLVED_URL" > client/public/brand/_wc26/SOURCE.txt

      - name: Commit candidates to this branch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add client/public/brand/_wc26
          git commit -m "WC26 emblem candidates fetched via CI (one-shot; source in _wc26/SOURCE.txt)"
          git push
