name: LiveLab CI

on:
  push:
    branches: [main]
    paths: ['livelab/**', '.github/workflows/livelab-ci.yml']
  pull_request:
    paths: ['livelab/**', '.github/workflows/livelab-ci.yml']
  workflow_dispatch:

defaults:
  run:
    working-directory: livelab

jobs:
  build-test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: livelab/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright-core install chromium --with-deps
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: ''

      - name: Disable piped core dumps (Linux)
        if: runner.os == 'Linux'
        # Ubuntu images pipe renderer core dumps to apport, which delays
        # crashed-process exit (and therefore Playwright 'crash' events) by
        # however long the multi-hundred-MB core takes to drain.
        run: |
          cat /proc/sys/kernel/core_pattern
          echo core | sudo tee /proc/sys/kernel/core_pattern

      - name: Dependency audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: ${{ matrix.os != 'ubuntu-latest' }}

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

      - name: Runtime integration tests
        run: npm run test:integration

      - name: MCP contract tests
        run: npm run test:mcp

      - name: Extension tests (Linux, Xvfb)
        if: runner.os == 'Linux'
        run: npm run test:extension

      - name: Extension tests (macOS/Windows)
        if: runner.os != 'Linux'
        run: npm run test:extension

      - name: End-to-end tests (Vite test app)
        if: runner.os == 'Linux'
        run: npm run test:e2e

      - name: Package VSIX
        run: npm run package

      - name: Clean-profile install test (Linux)
        if: runner.os == 'Linux'
        run: node scripts/clean-profile-test.mjs

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: livelab-vsix-${{ matrix.os }}
          path: livelab/artifacts/livelab-*.vsix
          if-no-files-found: error
