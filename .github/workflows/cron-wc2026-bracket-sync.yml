# Cron — WC2026 bracket sync — GitHub Actions timer for a Manus-orphaned background job.
#
# After the Manus Heartbeat is retired, nothing triggers /api/scheduled/wc2026-bracket-sync. This
# workflow fires POST /api/scheduled/wc2026-bracket-sync on the Railway app on a schedule. The
# endpoint is shared-secret authed (CRON_SECRET, re-gated by cronAuth.ts).
#
# NO in-process overlap guard: handleWc2026BracketSync (server/wc2026/wc2026Heartbeat.ts:230-273)
# has no run-lock — it spawns wc2026BracketScraper.mjs as a child process on every
# invocation with no _isRunning/single-flight check. Two overlapping triggers (this
# schedule firing again before the previous run finishes, or a POST-FT hook from
# handleWc2026EspnResults/handleWc2026LiveScores landing mid-run) can spawn concurrent
# scrapers. curl's --max-time 60 only aborts the GitHub Actions HTTP client; the
# Express handler already responded and the spawned scraper keeps running server-side
# regardless of the curl timeout.
#
# IMPORTANT (cutover runbook): this workflow ships ENABLED on the default cron.
# GitHub Actions cron cannot be shipped disabled, so a workflow_dispatch trigger
# is provided for manual runs. It MUST NOT run while Manus still writes the same
# data — enable/disable it from the Actions UI (⋯ → Disable workflow) at the
# cutover moment to avoid double-writes.
#
# Required repo secrets:
#   RAILWAY_APP_URL — e.g. https://your-app.up.railway.app  (no trailing slash)
#   CRON_SECRET     — must match the CRON_SECRET env var set in Railway → Variables
#
# Note: GitHub cron is UTC and best-effort (runs can be delayed minutes under
# platform load).
name: Cron — WC2026 bracket sync

on:
  schedule:
    - cron: "*/30 * * * *" # every 30 minutes — matches "every 30 min during knockout phase"
      # (server/wc2026/wc2026Heartbeat.ts:229). Previously */10 (3x over-fire vs. the
      # documented cadence); with no in-process run-lock (see header above) that could
      # spawn concurrent scrapers.
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: cron-wc2026-bracket-sync
  cancel-in-progress: false

jobs:
  fire:
    name: Trigger /api/scheduled/wc2026-bracket-sync
    runs-on: ubuntu-latest
    steps:
      - name: "[STEP] Preflight — verify required secrets are present"
        env:
          RAILWAY_APP_URL: ${{ secrets.RAILWAY_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${RAILWAY_APP_URL:-}" ]; then
            echo "::error::RAILWAY_APP_URL secret is not set"; exit 1
          fi
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CRON_SECRET secret is not set"; exit 1
          fi
          echo "[PREFLIGHT] secrets present"

      - name: "[STEP] POST /api/scheduled/wc2026-bracket-sync (secret never printed)"
        env:
          RAILWAY_APP_URL: ${{ secrets.RAILWAY_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          URL="${RAILWAY_APP_URL%/}/api/scheduled/wc2026-bracket-sync"
          echo "[INPUT] POST $URL at $(date -u +%FT%TZ)"
          BODY_FILE="$(mktemp)"
          CODE=$(curl -sS -o "$BODY_FILE" -w '%{http_code}' \
            --max-time 60 --retry 2 --retry-delay 5 --retry-connrefused \
            -X POST "$URL" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: gh-actions-cron/wc2026-bracket-sync")
          echo "[OUTPUT] HTTP $CODE"
          echo "[OUTPUT] body: $(cat "$BODY_FILE")"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "::error::wc2026-bracket-sync trigger failed with HTTP $CODE"
            exit 1
          fi
          echo "[VERIFY] PASS — wc2026-bracket-sync accepted (HTTP $CODE)"
