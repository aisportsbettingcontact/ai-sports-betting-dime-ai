name: WC Jul11 BetExplorer Probe (read-only)

# Read-only recon: scrapes bet365 (via BetExplorer) odds for the two July 11
# quarterfinals — wc26-qf-099 (NOR vs ENG) and wc26-qf-100 (ARG vs SUI). No DB
# writes, no secrets — output is the JSON book blob in the Actions log, used to
# fill the v22 engine's JUL11_BOOK block. Runs on a CI runner (real egress,
# unlike the sandboxed agent container).

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: wc-jul11-probe
  cancel-in-progress: false

jobs:
  probe:
    name: Probe QF odds (NOR/ENG, ARG/SUI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install probe deps
        run: pip install --quiet requests beautifulsoup4
      - name: Run BetExplorer probe
        run: python3 server/wc2026/jul11_betexplorer_probe.py
