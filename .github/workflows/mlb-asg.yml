# MLB All-Star Game — seed / publish / live-refresh.
#
# Fires POST /api/cron/mlb-asg on the Railway app (CRON_SECRET-authed). The
# endpoint ensures the AL-vs-NL games row exists, refreshes the BOOK via the same
# production AN path as every MLB game, writes the owner MODEL (ML + run-line +
# total ladders, rung-selected to the live book line), publishes, and audits.
#
#   dry_run=true  → scrape + compute + return the book-vs-model tail, write nothing
#   dry_run=false → the full seed/publish/refresh (default)
#
# The schedule keeps the book + model rungs LIVE as the market moves on game day.
# ⚠️ Disable this workflow (Actions → ⋯ → Disable workflow) after 2026-07-14.
#
# Required repo secrets: RAILWAY_APP_URL (no trailing slash), CRON_SECRET.
name: MLB ASG — seed/publish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true = preview only (no writes); false = seed/publish"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
  schedule:
    - cron: "4,19,34,49 * * * *" # every 15 min — keep book + model rungs live on game day

permissions:
  contents: read

concurrency:
  group: mlb-asg
  cancel-in-progress: false

jobs:
  fire:
    name: POST /api/cron/mlb-asg
    runs-on: ubuntu-latest
    steps:
      - name: "[STEP] Preflight — verify required secrets are present"
        env:
          RAILWAY_APP_URL: ${{ secrets.RAILWAY_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${RAILWAY_APP_URL:-}" ]; then echo "::error::RAILWAY_APP_URL secret is not set"; exit 1; fi
          if [ -z "${CRON_SECRET:-}" ]; then echo "::error::CRON_SECRET secret is not set"; exit 1; fi
          echo "[PREFLIGHT] secrets present"

      - name: "[STEP] POST /api/cron/mlb-asg (secret never printed)"
        env:
          RAILWAY_APP_URL: ${{ secrets.RAILWAY_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          URL="${RAILWAY_APP_URL%/}/api/cron/mlb-asg"
          BODY_JSON=$(printf '{"dryRun": %s}' "${DRY_RUN}")
          echo "[INPUT] POST $URL  body=$BODY_JSON  at $(date -u +%FT%TZ)"
          BODY_FILE="$(mktemp)"
          CODE=$(curl -sS -o "$BODY_FILE" -w '%{http_code}' \
            --max-time 120 --retry 1 --retry-delay 5 --retry-connrefused \
            -X POST "$URL" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: gh-actions/mlb-asg" \
            --data "$BODY_JSON")
          echo "[OUTPUT] HTTP $CODE"
          echo "[OUTPUT] body:"; cat "$BODY_FILE"; echo
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "::error::mlb-asg trigger failed with HTTP $CODE"; exit 1
          fi
          echo "[VERIFY] PASS — mlb-asg accepted (HTTP $CODE)"
