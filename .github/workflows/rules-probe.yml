name: rules-probe
on:
  push:
    branches: [rules-probe]
permissions:
  contents: read
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Branch protection visibility
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          H1="Authorization: Bearer $GH_TOKEN"; H2="Accept: application/vnd.github+json"
          echo "::group::branch object (protected flag + protection summary)"
          curl -sS -H "$H1" -H "$H2" "https://api.github.com/repos/${{ github.repository }}/branches/main" | jq '{name, protected, protection}'
          echo "::endgroup::"
