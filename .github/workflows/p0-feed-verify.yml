name: P0 Feed Verify (read-only)

# ─────────────────────────────────────────────────────────────────────────────
# Read-only verification that the THREE P0 surfaces actually carry live data on
# the deployed Railway app. Hits public tRPC feed endpoints from a GitHub runner
# (which has real egress, unlike the sandboxed agent container) and reports
# HTTP status, the X-Games-Count header, and presence/counts of key fields.
#
# No secrets. No writes. It never dumps full rows — only counts and field
# presence — so it is safe to run repeatedly (e.g. for two-cycle verification).
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      origin:
        description: "Origin to verify"
        required: true
        default: "https://ai-sports-betting-dime-ai-production.up.railway.app"
        type: string
      proc:
        description: "Ad-hoc: single tRPC procedure to probe (optional; overrides the default suite)"
        required: false
        type: string
      input_json:
        description: "Ad-hoc: JSON input for the procedure (e.g. {\"sport\":\"MLB\"} or null)"
        required: false
        default: "null"
        type: string

permissions:
  contents: read

concurrency:
  group: p0-feed-verify
  cancel-in-progress: false

jobs:
  verify:
    name: Verify live feed data
    runs-on: ubuntu-latest
    env:
      ORIGIN: ${{ inputs.origin }}
      PROC: ${{ inputs.proc }}
      INPUT_JSON: ${{ inputs.input_json }}
    steps:
      - name: Probe public feed endpoints
        run: |
          set -uo pipefail
          base="${ORIGIN%/}"
          stamp() { date -u +%FT%TZ; }

          # tRPC httpBatchLink GET: /api/trpc/<proc>?batch=1&input=<urlenc {"0":{"json":<input>}}>
          enc() { jq -rn --arg s "$1" '$s|@uri'; }
          batch_input() { printf '{"0":{"json":%s}}' "$1"; }

          probe() {
            local label="$1" proc="$2" json="$3"
            local input; input="$(batch_input "$json")"
            local url="$base/api/trpc/$proc?batch=1&input=$(enc "$input")"
            echo "---- $label : $proc  @ $(stamp) ----"
            local hdr body code
            hdr="$(mktemp)"; body="$(mktemp)"
            code="$(curl -sS -D "$hdr" -o "$body" -w '%{http_code}' --max-time 45 "$url" 2>&1)" || code="ERR"
            echo "HTTP $code"
            grep -i '^x-games-count:' "$hdr" || true
            grep -i '^x-cache-status:' "$hdr" || true
            local n; n=$(wc -c < "$body")
            echo "body_bytes=$n"
            # Field-presence signals (counts, never values):
            # modelRunAt is a numeric bigint (epoch ms) or null — count both correctly.
            echo "modelRunAt_number=$(grep -o '\"modelRunAt\":[0-9]' "$body" | wc -l)"
            echo "modelRunAt_null=$(grep -o '\"modelRunAt\":null' "$body" | wc -l)"
            echo "edge_tags=$(grep -o '\[EDGE\]' "$body" | wc -l)"
            echo "modelTotal_fields=$(grep -o '\"modelTotal\"' "$body" | wc -l)"
            echo "splits_fields=$(grep -o 'BetsPct\|MoneyPct\|ticketsPct\|moneyPct' "$body" | wc -l)"
            # WC-specific signals: Double Chance appears once per side (dkOdds=book,
            # modelOdds=model), so N matches with both book AND model DC → 2N counts.
            echo "wc_homeDrawOdds=$(grep -o '\"homeDrawOdds\":-\?[0-9]' "$body" | wc -l)"
            echo "wc_awayDrawOdds=$(grep -o '\"awayDrawOdds\":-\?[0-9]' "$body" | wc -l)"
            echo "wc_noDraw=$(grep -o '\"noDraw\":-\?[0-9]' "$body" | wc -l)"
            echo "wc_dkOdds_objs=$(grep -o '\"dkOdds\":{' "$body" | wc -l)"
            echo "wc_modelOdds_objs=$(grep -o '\"modelOdds\":{' "$body" | wc -l)"
            echo "wc_venueIds=$(grep -o '\"venueId\":\"[a-z0-9-]*\"' "$body" | sort | uniq -c | tr '\n' ' ')"
            # First 500 bytes for shape sanity (public data only):
            echo "head: $(head -c 500 "$body" | tr '\n' ' ')"
            echo
          }

          echo "=================== P0 FEED VERIFY @ $(stamp) ==================="
          echo "ORIGIN: $base"
          if [ -n "${PROC:-}" ]; then
            probe "ad-hoc" "$PROC" "${INPUT_JSON:-null}"
          else
            probe "current date"       "games.getCurrentDate" "null"
            probe "last refresh"       "games.lastRefresh"    "null"
            probe "MLB 07-10"          "games.list"           '{"sport":"MLB","gameDate":"2026-07-10"}'
            probe "MLB 07-11"          "games.list"           '{"sport":"MLB","gameDate":"2026-07-11"}'
            probe "MLB splits"         "games.liveSplits"     "null"
            probe "WC today+odds"      "wc2026.todayWithOdds" "null"
            probe "WC by date 07-11"   "wc2026.matchesByDate" '{"date":"2026-07-11"}'
          fi
          echo "=================== END ==================="
