<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, viewport-fit=cover" />
    <title>AI Sports Betting</title>
    <meta name="description" content="AI-powered sports betting model projections — spreads, totals, and edges. Moneylines, spreads, totals, and real-time edges." />
    <!-- Performance: preload Inter 700 woff2 before stylesheet to prevent FOUT -->
    <link rel="preload" as="font" type="font/woff2" crossorigin
      href="https://fonts.gstatic.com/s/inter/v13/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuFuYAZJhiJ-Ek-_EeA.woff2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- font-display:optional prevents FOUT on slow connections (uses system font immediately) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=optional"
      rel="stylesheet"
    />
    <!-- GG Sans: Discord's proprietary font, served from our CDN (sourced from Discord's public assets) -->
    <style>
      @font-face {
        font-family: 'GG Sans';
        src: url('https://d2xsxph8kpxj0f.cloudfront.net/310519663397752079/MW3FicTy7ae3qrm8dx8Lua/ggsans-normal-400_4f9ee2e1.woff2') format('woff2');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'GG Sans';
        src: url('https://d2xsxph8kpxj0f.cloudfront.net/310519663397752079/MW3FicTy7ae3qrm8dx8Lua/ggsans-normal-500_32c749e5.woff2') format('woff2');
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'GG Sans';
        src: url('https://d2xsxph8kpxj0f.cloudfront.net/310519663397752079/MW3FicTy7ae3qrm8dx8Lua/ggsans-normal-600_328a863d.woff2') format('woff2');
        font-weight: 600;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'GG Sans';
        src: url('https://d2xsxph8kpxj0f.cloudfront.net/310519663397752079/MW3FicTy7ae3qrm8dx8Lua/ggsans-normal-700_0f62247a.woff2') format('woff2');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
    </style>
  </head>
  <body>
    <!-- ═══════════════════════════════════════════════════════════════════
         HTML LOADING SHELL — renders IMMEDIATELY before any JS executes.
         Single unified loading state: covers JS parse, React hydration,
         Suspense (null fallback), auth check, and route resolution.
         Hides the moment React renders real visible content into #root.

         ARCHITECTURE:
         1. Shell renders at 0ms (pure HTML/CSS, no JS required)
         2. JS loads + React hydrates → Suspense fallback=null → #root empty
         3. Auth check fires (appUsers.me API call, ~100-300ms)
         4. Auth resolves → lazy page chunk loads → React renders content
         5. MutationObserver detects first non-empty child in #root subtree
         6. Shell fades out (200ms) → removed from DOM

         KEY: subtree:true + characterData:true catches React's text nodes
         and deeply nested renders, not just direct #root children.
         This handles the case where Suspense renders null (no direct child)
         but the lazy component eventually renders nested content.
         ═══════════════════════════════════════════════════════════════════ -->
    <style>
      /* ── HTML Loading Shell: AI Sports Betting brand ─────────────────────── */
      /* Appears on initial page load while JS bundle downloads + React mounts. */
      /* Dismissed by MutationObserver the moment React renders real content.   */
      #html-loading-shell {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #0a0a0f;
        z-index: 9999;
        transition: opacity 0.25s ease;
      }
      #html-loading-shell.hidden {
        opacity: 0;
        pointer-events: none;
      }
      /* AI Sports Betting site logo image */
      .html-shell-logo-img {
        width: 120px;
        height: 120px;
        border-radius: 16px;
        object-fit: cover;
        margin-bottom: 20px;
        /* Subtle neon glow halo that pulses — draws attention without distraction */
        animation: shell-logo-pulse 2.2s ease-in-out infinite;
      }
      @keyframes shell-logo-pulse {
        0%, 100% { filter: drop-shadow(0 0 8px rgba(57,255,20,0.20)); }
        50%       { filter: drop-shadow(0 0 18px rgba(57,255,20,0.45)); }
      }
      /* Progress bar track */
      .html-shell-bar-track {
        width: 160px;
        height: 3px;
        background: rgba(255,255,255,0.08);
        border-radius: 99px;
        overflow: hidden;
        margin-bottom: 12px;
      }
      /* Neon green left-to-right fill that loops */
      .html-shell-bar-fill {
        height: 100%;
        width: 45%;
        border-radius: 99px;
        background: linear-gradient(90deg, #39FF14 0%, #22c55e 60%, #39FF14 100%);
        box-shadow: 0 0 8px rgba(57,255,20,0.7);
        animation: shell-bar-slide 1.4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes shell-bar-slide {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(400%); }
      }
      /* "Loading..." label */
      .html-shell-label {
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.08em;
        color: rgba(255,255,255,0.40);
        text-transform: uppercase;
      }
    </style>
    <!-- AI Sports Betting loading shell: logo + neon green progress bar + label -->
    <div id="html-loading-shell">
      <!-- AI Sports Betting site logo -->
      <img
        class="html-shell-logo-img"
        src="/manus-storage/logo-aisportsbetting_429c188f.jpg"
        alt="AI Sports Betting"
      />
      <!-- Neon green left-to-right progress bar -->
      <div class="html-shell-bar-track">
        <div class="html-shell-bar-fill"></div>
      </div>
      <!-- Loading label -->
      <div class="html-shell-label">Loading...</div>
    </div>
    <!-- React mounts here. Once React renders real content, the loading shell fades out. -->
    <div id="root"></div>
    <script>
      // ─── HTML Shell Dismissal Logic ───────────────────────────────────────────
      // Strategy: observe #root with subtree:true so we catch React renders at
      // ANY depth — including when Suspense fallback=null renders nothing at the
      // top level but the lazy page eventually renders nested DOM nodes.
      //
      // We dismiss the shell when #root has actual visible content:
      //   - At least one element child anywhere in the subtree, AND
      //   - That element has non-zero dimensions (not just a React comment node)
      //
      // This prevents premature dismissal on React's internal fiber nodes.
      (function() {
        var shell = document.getElementById('html-loading-shell');
        var root  = document.getElementById('root');
        if (!shell || !root) return;

        var dismissed = false;
        function dismiss() {
          if (dismissed) return;
          dismissed = true;
          shell.classList.add('hidden');
          // Remove from DOM after fade completes (200ms transition)
          setTimeout(function() {
            if (shell.parentNode) shell.parentNode.removeChild(shell);
          }, 250);
          obs.disconnect();
        }

        function hasVisibleContent() {
          // Check if #root has any element descendants with actual content
          var allEls = root.querySelectorAll('*');
          for (var i = 0; i < allEls.length; i++) {
            var el = allEls[i];
            // Skip script/style/meta tags
            var tag = el.tagName;
            if (tag === 'SCRIPT' || tag === 'STYLE' || tag === 'META') continue;
            // Any real element with content = ready
            if (el.children.length > 0 || (el.textContent && el.textContent.trim().length > 0)) {
              return true;
            }
          }
          return false;
        }

        var obs = new MutationObserver(function(mutations) {
          // Check on every mutation if real content has appeared
          if (hasVisibleContent()) {
            dismiss();
          }
        });

        // subtree:true catches deeply nested React renders
        // childList:true catches element additions/removals
        // characterData:true catches text node changes (React text renders)
        obs.observe(root, { childList: true, subtree: true, characterData: true });

        // Safety: force-dismiss after 8s regardless of content state
        // This prevents the shell from blocking the UI if something goes wrong
        setTimeout(function() {
          if (!dismissed) {
            console.warn('[HTML Shell] Force-dismissed after 8s safety timeout');
            dismiss();
          }
        }, 8000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
