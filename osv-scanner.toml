# osv-scanner config — dependency security gate, replacing `pnpm audit`.
#
# `pnpm audit` calls npm's legacy /-/npm/v1/security/audits[/quick] endpoints,
# which npm retired 2026-07-15 (410 Gone). The fix landed in pnpm v11.0, but
# this repo is intentionally pinned to pnpm@10.33.0 (see package.json's
# "packageManager" field — pnpm/action-setup@v4 misparses a sha512 hash there,
# GHSA-379q-355j-w6rj) and pnpm v11 silently stops reading the package.json
# "pnpm" config block (overrides/patchedDependencies/onlyBuiltDependencies/
# auditConfig) — a bigger, separate migration. `npm audit` was tried as a
# substitute and abandoned: it can't even resolve this repo's tree (a
# transitive dependency, @upsetjs/venn.js@2.0.0, ships a Yarn-only `patch:`
# devDependency reference that npm's parser has never supported).
#
# osv-scanner reads pnpm-lock.yaml directly — no install, no dependency
# resolution, no package-manager involvement — so it sidesteps both problems
# and audits the *actual* pinned versions instead of a resolver's guess.
# See scripts/check-osv-scan.mjs for the HIGH/CRITICAL severity gate this
# feeds into.
#
# Reviewed quarterly. Each entry below is a real, currently-open finding
# confirmed unfixable (or not applicable to production) as of 2026-07-15 —
# re-verify against a fresh `osv-scanner scan source -L pnpm-lock.yaml`
# before removing or renewing any entry.

